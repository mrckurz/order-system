<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#c0392b" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>OrderFlow · Waiter</title>
</head>
<body>
  <header class="topbar">
    <h1 id="title">OrderFlow</h1>
    <span class="badge" id="pending" hidden></span>
    <span class="badge" id="waiterName"></span>
    <button class="btn-sm btn-ghost" id="logoutBtn" style="color:#fff" hidden></button>
  </header>

  <main id="app" style="padding-bottom:160px">
    <div class="empty-state" id="loading">…</div>
  </main>

  <div class="cart-bar" id="cartBar" hidden>
    <button class="cart-summary" id="cartSummary" type="button">
      <span id="cartSummaryText"></span>
      <span class="cart-chevron" id="cartChevron">▴</span>
    </button>
    <div class="cart-list" id="cartList" hidden></div>
    <div class="row" style="margin:.5rem 0">
      <input id="tableInput" placeholder="Tisch *" required class="grow" />
      <input id="noteInput" placeholder="Notiz" class="grow" />
    </div>
    <div class="row">
      <button class="btn-ghost btn-sm" id="clearBtn"></button>
      <button class="btn-primary grow" id="reviewBtn"><span id="reviewLabel"></span> · <span id="cartTotal"></span></button>
    </div>
  </div>

  <div class="review-overlay" id="reviewOverlay" hidden>
    <div class="review-sheet">
      <div class="review-head">
        <h2 id="reviewTitle"></h2>
        <button class="btn-ghost btn-sm" id="reviewClose" aria-label="close">✕</button>
      </div>
      <div class="review-meta" id="reviewMeta"></div>
      <div class="review-list" id="reviewList"></div>
      <div class="review-foot">
        <div class="row" style="justify-content:space-between;font-weight:600">
          <span id="reviewTotalLabel"></span><span id="reviewTotal"></span>
        </div>
        <div class="row">
          <button class="btn-ghost" id="reviewBack"></button>
          <button class="btn-primary grow" id="confirmSendBtn"><span id="sendLabel"></span></button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="js/waiter.js" type="module"></script>
</body>
</html>
