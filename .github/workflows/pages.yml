name: Deploy PWA to GitHub Pages

# Publishes the static frontend (public/) to GitHub Pages.
# The backend API is deployed separately (see docs/DEPLOYMENT.md).
#
# Set the API URL once under: Settings → Secrets and variables → Actions →
# Variables → New repository variable → name: ORDERFLOW_API_URL,
# value: https://your-backend.example.com

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'scripts/build-pages.js'
      - 'scripts/generate-icons.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Build static PWA
        env:
          ORDERFLOW_API_URL: ${{ vars.ORDERFLOW_API_URL }}
        run: npm run build:pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
